<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dash is a systems language focused on explicit control, LLVM-based compilation, FFI, linking flexibility, and practical tooling." />
    <title>Dash Programming Language</title>
    <link id="site-favicon" rel="icon" type="image/svg+xml" href="/logo.svg" />
    <script>
      (function () {
        const updateFavicon = () => {
          const link = document.getElementById('site-favicon')
          if (!link) return
          const dark = window.matchMedia('(prefers-color-scheme: dark)').matches
          link.setAttribute('href', dark ? '/logo-white.svg' : '/logo.svg')
        }
        updateFavicon()
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
